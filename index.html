<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>

  :root {
    --blue: #1a56db; --blue-dark: #1245b3;
    --green: #0e9f6e; --red: #e02424;
    --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;

    --kakao: #FEE500; --kakao-text: #3A1D1D;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--gray-100); color: var(--gray-800); min-height: 100vh; padding-bottom: 80px; }
  .app { max-width: 480px; margin: 0 auto; background: var(--white); min-height: 100vh; }

  .header { position: sticky; top: 0; z-index: 50; background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 0 16px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .header-logo { font-size: 20px; font-weight: 900; color: var(--blue); }
  .header-logo span { color: var(--gray-800); }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; cursor: pointer; overflow: hidden; }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .login-btn { font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 20px; background: var(--blue); color: white; border: none; cursor: pointer; font-family: inherit; }

  .tab { display: none; }
  .tab.active { display: block; }

  .hero { background: linear-gradient(135deg, #1a56db 0%, #1245b3 100%); padding: 24px 20px 28px; color: white; }
  .hero-badge { display: inline-block; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; font-size: 11px; font-weight: 600; padding: 3px 10px; margin-bottom: 10px; }
  .hero h2 { font-size: 22px; font-weight: 900; line-height: 1.3; margin-bottom: 6px; }
  .hero p { font-size: 13px; opacity: 0.85; margin-bottom: 18px; }
  .hero-search { display: flex; gap: 8px; }
  .hero-search input { flex: 1; padding: 11px 14px; border: none; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; }
  .hero-search button { background: #fbbf24; color: #1f2937; border: none; border-radius: 10px; padding: 11px 16px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; }

  .section-title { padding: 20px 16px 12px; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
  .section-title span { font-size: 12px; color: var(--blue); font-weight: 600; cursor: pointer; }
  .tire-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px 20px; }
  .tire-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 14px; overflow: hidden; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.15s; }
  .tire-card:active { transform: scale(0.98); }
  .tire-card-img { width: 100%; height: 130px; object-fit: cover; display: block; }
  .tire-card-placeholder { width: 100%; height: 130px; background: linear-gradient(135deg, #e5e7eb, #d1d5db); display: flex; align-items: center; justify-content: center; font-size: 32px; }
  .tire-card-body { padding: 10px 12px 12px; }
  .tire-card-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-bottom: 5px; background: #d1fae5; color: var(--green); }
  .tire-card-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tire-card-size { font-size: 11px; color: var(--gray-400); margin-bottom: 6px; }
  .tire-card-price { font-size: 15px; font-weight: 900; color: var(--blue); }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--gray-400); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  .sell-wrap { padding: 20px 16px; }
  .sell-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; }
  .photo-upload { border: 2px dashed var(--gray-200); border-radius: 14px; height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 16px; background: var(--gray-50); overflow: hidden; position: relative; }
  .photo-upload:hover { border-color: var(--blue); }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--gray-600); margin-bottom: 6px; }
  .form-input { width: 100%; padding: 13px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; color: var(--gray-800); transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--blue); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-textarea { width: 100%; padding: 13px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; color: var(--gray-800); resize: none; height: 100px; }
  .form-textarea:focus { border-color: var(--blue); }
  .btn-primary { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 4px; }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-primary:disabled { background: var(--gray-400); cursor: not-allowed; }
  .login-required { text-align: center; padding: 40px 20px; color: var(--gray-400); }
  .login-required .icon { font-size: 48px; margin-bottom: 12px; }
  .login-required p { font-size: 14px; margin-bottom: 20px; color: var(--gray-600); }
  .btn-google { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; background: white; border: 1.5px solid var(--gray-200); border-radius: 12px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; color: var(--gray-800); }

  .chat-tab-wrap { display: flex; border-bottom: 1px solid var(--gray-200); background: white; position: sticky; top: 56px; z-index: 10; }
  .chat-tab-btn { flex: 1; padding: 13px; font-size: 13px; font-weight: 700; font-family: inherit; border: none; background: none; color: var(--gray-400); cursor: pointer; border-bottom: 2px solid transparent; }
  .chat-tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

  .chat-wrap { display: flex; flex-direction: column; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: var(--gray-50); }
  .chat-bubble-wrap { display: flex; }
  .chat-bubble-wrap.me { justify-content: flex-end; }
  .chat-bubble { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; background: white; color: var(--gray-800); border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
  .chat-bubble-wrap.me .chat-bubble { background: var(--blue); color: white; border-bottom-left-radius: 18px; border-bottom-right-radius: 4px; }
  .chat-bubble.bot { background: #eff6ff; border: 1px solid #bfdbfe; }
  .chat-time { font-size: 10px; color: var(--gray-400); margin-top: 4px; }
  .chat-bubble-wrap.me .chat-time { text-align: right; }
  .chat-sender { font-size: 10px; color: var(--gray-400); margin-bottom: 3px; }
  .chat-input-wrap { display: flex; gap: 8px; padding: 12px 16px; background: white; border-top: 1px solid var(--gray-200); }
  .chat-input { flex: 1; padding: 11px 14px; border: 1.5px solid var(--gray-200); border-radius: 24px; font-size: 14px; font-family: inherit; outline: none; }
  .chat-input:focus { border-color: var(--blue); }
  .chat-send { width: 44px; height: 44px; background: var(--blue); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 18px; flex-shrink: 0; }

  .room-list { overflow-y: auto; }
  .room-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--gray-100); cursor: pointer; transition: background 0.1s; }
  .room-item:hover { background: var(--gray-50); }
  .room-avatar { width: 46px; height: 46px; border-radius: 50%; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
  .room-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .room-info { flex: 1; min-width: 0; }
  .room-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
  .room-last { font-size: 12px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .room-time { font-size: 10px; color: var(--gray-400); flex-shrink: 0; }

  .dm-wrap { display: none; flex-direction: column; }
  .dm-wrap.open { display: flex; }
  .dm-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--gray-200); background: white; }
  .dm-back { background: none; border: none; font-size: 22px; cursor: pointer; line-height: 1; color: var(--gray-600); }
  .dm-title { font-size: 15px; font-weight: 700; }

  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 64px; background: white; border-top: 1px solid var(--gray-200); display: flex; z-index: 50; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; cursor: pointer; color: var(--gray-400); font-family: inherit; }
  .nav-btn.active { color: var(--blue); }
  .nav-btn .icon { font-size: 20px; }
  .nav-btn .label { font-size: 10px; font-weight: 600; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 24px 20px 32px; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: var(--gray-100); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; }
  .modal-img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; margin-bottom: 16px; }
  .modal-badge { font-size: 11px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
  .modal-title { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
  .modal-size { font-size: 13px; color: var(--gray-400); margin-bottom: 16px; }

  .modal-price { font-size: 26px; font-weight: 900; color: var(--blue); }
  .modal-seller-row { font-size: 12px; color: var(--gray-400); margin-bottom: 16px; }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-secondary { padding: 14px; border: 1.5px solid var(--gray-200); border-radius: 12px; background: white; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

  /* 로그인 모달 */
  .login-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
  .login-modal-overlay.open { display: flex; }
  .login-modal { background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 32px 24px 40px; position: relative; }
  .login-modal h3 { font-size: 18px; font-weight: 900; margin-bottom: 6px; }
  .login-modal p { font-size: 13px; color: var(--gray-400); margin-bottom: 24px; }
  .login-modal-close { position: absolute; top: 16px; right: 16px; background: var(--gray-100); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; }
  /* 로그인 안내 박스 */
  .login-info-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--blue); margin-top: 14px; line-height: 1.6; }

  .toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--gray-800); color: white; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 300; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .loading { text-align: center; padding: 60px 20px; color: var(--gray-400); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--gray-200); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .quick-btns { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; background: white; border-bottom: 1px solid var(--gray-100); scrollbar-width: none; }
  .quick-btns::-webkit-scrollbar { display: none; }
  .quick-btn { white-space: nowrap; padding: 6px 12px; border: 1.5px solid var(--blue); border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--blue); background: white; cursor: pointer; font-family: inherit; flex-shrink: 0; }
  .quick-btn:hover { background: #eff6ff; }
  .system-msg { text-align: center; font-size: 11px; color: var(--gray-400); background: #fffbeb; border-radius: 8px; padding: 8px 12px; margin: 4px 0; line-height: 1.5; }
</style>

<body>
<div class="app">
  <header class="header">
    <div class="header-logo">Tire<span>Safe</span></div>
    <div id="auth-area">
      <button class="login-btn" onclick="showLoginModal()">로그인</button>
    </div>
  </header>

  <div class="tab active" id="tab-home">
    <div class="hero">
      <div class="hero-badge">🔧 카센터 10년 경력 전문가 검증</div>
      <h2>믿고 사는<br>중고 타이어</h2>
      <p>장착 완료 전까지 대금 보호 · 세이프페이</p>
      <div class="hero-search">
        <input type="text" id="search-input" placeholder="사이즈 검색 (예: 245/45/18)">
        <button onclick="loadTires()">검색</button>
      </div>
    </div>
    <div class="section-title">실시간 매물 <span onclick="loadTires()">새로고침</span></div>
    <div class="tire-grid" id="tire-grid">
      <div class="loading" style="grid-column:1/-1"><div class="spinner"></div><p>불러오는 중...</p></div>
    </div>
  </div>

  <div class="tab" id="tab-sell">
    <div class="sell-wrap">
      <div class="sell-title">타이어 판매하기</div>
      <div id="sell-content"></div>
    </div>
  </div>

  <div class="tab" id="tab-chat">
    <div class="chat-tab-wrap">
      <button class="chat-tab-btn active" id="ctab-dm" onclick="switchChatTab('dm')">💬 1:1 대화</button>
      <button class="chat-tab-btn" id="ctab-bot" onclick="switchChatTab('bot')">🤖 고객센터</button>

    <div id="chat-dm-area">
      <div id="dm-room-list" class="room-list" style="height:calc(100vh - 175px);overflow-y:auto"></div>

        <div class="dm-header">
          <button class="dm-back" onclick="closeDmRoom()">←</button>
          <div class="dm-title" id="dm-chat-title">채팅</div>
        </div>
        <div class="chat-wrap" style="height:calc(100vh - 175px)">
          <div class="chat-messages" id="dm-messages"></div>
          <div class="chat-input-wrap">
            <input type="text" class="chat-input" id="dm-input" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sendDmMsg()">
            <button class="chat-send" onclick="sendDmMsg()">↑</button>
          </div>
        </div>
      </div>
    </div>
    <div id="chat-bot-area" style="display:none">
      <div class="quick-btns">
        <button class="quick-btn" onclick="quickAsk('타이어 사이즈 고르는 법')">🔍 사이즈 고르는 법</button>
        <button class="quick-btn" onclick="quickAsk('배송은 얼마나 걸려요?')">🚚 배송 기간</button>
        <button class="quick-btn" onclick="quickAsk('장착은 어디서 해요?')">🔧 장착 방법</button>
        <button class="quick-btn" onclick="quickAsk('환불 가능한가요?')">💰 환불 정책</button>
        <button class="quick-btn" onclick="quickAsk('세이프페이가 뭔가요?')">🔒 세이프페이</button>
        <button class="quick-btn" onclick="quickAsk('사장님과 직접 상담')">👨‍💼 사장님 상담</button>
      </div>
      <div class="chat-wrap" style="height:calc(100vh - 235px)">
        <div class="chat-messages" id="bot-messages"></div>
        <div class="chat-input-wrap">
          <input type="text" class="chat-input" id="bot-input" placeholder="궁금한 점을 물어보세요..." onkeydown="if(event.key==='Enter')sendBotMsg()">
          <button class="chat-send" onclick="sendBotMsg()">↑</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="switchTab('home')"><span class="icon">🏠</span><span class="label">홈</span></button>
    <button class="nav-btn" id="nav-sell" onclick="switchTab('sell')"><span class="icon">➕</span><span class="label">판매하기</span></button>
    <button class="nav-btn" id="nav-chat" onclick="switchTab('chat')"><span class="icon">💬</span><span class="label">채팅</span></button>
  </nav>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    
    <div id="modal-img-container" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:16px; scroll-snap-type: x mandatory;">
      <img class="modal-img" id="modal-img" src="" alt="" style="display:none; flex-shrink:0; scroll-snap-align: start;">
    </div>
    
    <div class="modal-badge">✅ 전문가 검증 완료</div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-size" id="modal-size"></div>

    <div class="modal-price-row">

    </div>
    <div class="modal-seller-row" id="modal-seller"></div>
    <div class="modal-btns">
      <button class="btn-secondary" id="modal-chat-btn" onclick="chatWithSeller()">💬 판매자 채팅</button>
      <button class="btn-primary" id="modal-pay-btn" style="margin:0" onclick="closeModal();toast('💳 결제 모듈 준비 중입니다')">🔒 세이프페이</button>
      
      <button class="btn-primary" id="modal-delete-btn" style="background:var(--red); display:none; grid-column: 1 / -1; margin-top:8px;" onclick="deleteTire()">🗑️ 이 게시글 삭제하기</button>
    </div>
  </div>
</div>

    <button class="login-modal-close" onclick="hideLoginModal()">✕</button>

      주소: <b>neglect900-netizen.github.io/tiresafe</b>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let currentDmRoomId = null;
let unsubDm = null;
let currentModalTire = null;
let pendingChatAfterLogin = null;

window.addEventListener('DOMContentLoaded', () => {
  addBotMsg('안녕하세요! 타이어세이프 고객센터입니다 😊\n무엇이든 질문해 주세요!');
});

// ── 로그인 모달 ──
function showLoginModal() { document.getElementById('login-modal-overlay').classList.add('open'); }
function hideLoginModal() { document.getElementById('login-modal-overlay').classList.remove('open'); }

// ── Redirect 결과 처리 ──
auth.getRedirectResult().then(result => {
  if (result && result.user) {
    toast('✅ 로그인 성공!');
    hideLoginModal();
    runPendingChat();
  }
}).catch(e => {
  if (e.code !== 'auth/no-current-user' && e.code !== 'auth/null-user') {
    toast('로그인 오류: ' + e.message);
  }
});

auth.onAuthStateChanged(user => {
  currentUser = user;
  updateAuthUI(user);
  loadTires();
  if (user) { hideLoginModal(); loadDmRooms(); runPendingChat(); }
});

function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });
  auth.signInWithPopup(provider)
    .then(() => { hideLoginModal(); runPendingChat(); })
    .catch(err => {
      if (err.code === 'auth/popup-blocked' ||
          err.code === 'auth/popup-closed-by-user' ||
          err.code === 'auth/cancelled-popup-request' ||
          err.code === 'auth/operation-not-supported-in-this-environment') {
        auth.signInWithRedirect(provider);
      } else {
        toast('로그인 오류: ' + err.message);
      }
    });
}

function logout() {
  if (confirm('로그아웃 하시겠습니까?')) auth.signOut();
}

function updateAuthUI(user) {
  const area = document.getElementById('auth-area');
  if (user) {
    const name = user.displayName || '유저';
    area.innerHTML = `<div class="user-avatar" onclick="logout()" title="로그아웃">
      ${user.photoURL ? `<img src="${user.photoURL}">` : name[0]}
    </div>`;
    renderSellForm();
  } else {
    area.innerHTML = `<button class="login-btn" onclick="showLoginModal()">로그인</button>`;
    document.getElementById('sell-content').innerHTML = `
      <div class="login-required"><div class="icon">🔒</div><p>판매하려면 로그인이 필요합니다</p>
        <button class="btn-google" onclick="googleLogin()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> 구글로 로그인
        </button></div>`;
  }
}

function runPendingChat() {
  if (pendingChatAfterLogin && currentUser) {
    const { sellerId, sellerName } = pendingChatAfterLogin;
    pendingChatAfterLogin = null;
    setTimeout(() => openOrCreateDmRoom(sellerId, sellerName, ''), 500);
  }
}

// ── 탭 전환 ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'home') loadTires();
  if (name === 'chat') { switchChatTab('dm'); loadDmRooms(); }
}

function switchChatTab(tab) {
  document.getElementById('ctab-dm').classList.toggle('active', tab === 'dm');
  document.getElementById('ctab-bot').classList.toggle('active', tab === 'bot');
  document.getElementById('chat-dm-area').style.display = tab === 'dm' ? 'block' : 'none';
  document.getElementById('chat-bot-area').style.display = tab === 'bot' ? 'block' : 'none';
  if (tab === 'dm') loadDmRooms();
}

// ── 1:1 채팅 ──
function getRoomId(uid1, uid2) { return [uid1, uid2].sort().join('_'); }

async function openOrCreateDmRoom(targetUid, targetName, targetPhoto) {
  if (!currentUser) {
    pendingChatAfterLogin = { sellerId: targetUid, sellerName: targetName };
    showLoginModal();
    return;
  }
  if (currentUser.uid === targetUid) { toast('본인에게는 채팅을 보낼 수 없어요'); return; }
  const roomId = getRoomId(currentUser.uid, targetUid);
  await db.collection('dmRooms').doc(roomId).set({
    users: [currentUser.uid, targetUid],
    userNames: { [currentUser.uid]: currentUser.displayName || '나', [targetUid]: targetName },
    userPhotos: { [currentUser.uid]: currentUser.photoURL || '', [targetUid]: targetPhoto || '' },
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  }, { merge: true });
  closeModal();
  switchTab('chat');
  setTimeout(() => openDmRoom(roomId, targetName), 200);
}

async function chatWithSeller() {
  if (!currentModalTire) return;
  const { sellerId, sellerName } = currentModalTire;
  if (!sellerId) { toast('판매자 정보가 없습니다'); return; }
  await openOrCreateDmRoom(sellerId, sellerName || '판매자', '');
}

function loadDmRooms() {
  const list = document.getElementById('dm-room-list');
  if (!currentUser) {
    list.innerHTML = `<div class="login-required"><div class="icon">🔒</div><p>1:1 채팅은 로그인이 필요합니다</p>
      <button class="btn-google" onclick="googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> 구글로 로그인
      </button></div>`;
    return;
  }
  db.collection('dmRooms').where('users', 'array-contains', currentUser.uid)
    .orderBy('updatedAt', 'desc').onSnapshot(snap => {
      if (snap.empty) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">💬</div><p>아직 대화가 없어요.<br>매물을 눌러 판매자와 채팅해보세요!</p></div>`;
        return;
      }
      list.innerHTML = snap.docs.map(doc => {
        const r = doc.data();
        const otherId = r.users.find(u => u !== currentUser.uid);
        const otherName = r.userNames?.[otherId] || '상대방';
        const otherPhoto = r.userPhotos?.[otherId] || '';
        const lastMsg = r.lastMsg || '채팅을 시작해보세요';
        const time = r.updatedAt ? new Date(r.updatedAt.toDate()).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : '';
        return `<div class="room-item" onclick="openDmRoom('${doc.id}','${otherName.replace(/'/g,"\\'")}')">
          <div class="room-avatar">${otherPhoto ? `<img src="${otherPhoto}">` : otherName[0]}</div>
          <div class="room-info"><div class="room-name">${otherName}</div><div class="room-last">${lastMsg}</div></div>
          <div class="room-time">${time}</div>
        </div>`;
      }).join('');
    });
}

function openDmRoom(roomId, title) {
  currentDmRoomId = roomId;
  document.getElementById('dm-chat-title').textContent = title;
  document.getElementById('dm-room-list').style.display = 'none';
  document.getElementById('dm-chat-wrap').classList.add('open');
  if (unsubDm) unsubDm();
  const msgBox = document.getElementById('dm-messages');
  msgBox.innerHTML = '';
  unsubDm = db.collection('dmRooms').doc(roomId).collection('messages').orderBy('createdAt').onSnapshot(snap => {
    msgBox.innerHTML = snap.docs.map(doc => {
      const m = doc.data();
      if (m.isSystem) return `<div class="system-msg">${m.text.replace(/\n/g,'<br>')}</div>`;
      const isMe = currentUser && m.uid === currentUser.uid;
      return `<div class="chat-bubble-wrap ${isMe?'me':''}"><div>
        ${!isMe ? `<div class="chat-sender">${m.name||'상대방'}</div>` : ''}
        <div class="chat-bubble">${m.text}</div>
        <div class="chat-time">${m.createdAt ? new Date(m.createdAt.toDate()).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : ''}</div>
      </div></div>`;
    }).join('');
    msgBox.scrollTop = msgBox.scrollHeight;
  });
}

function closeDmRoom() {
  currentDmRoomId = null;
  if (unsubDm) { unsubDm(); unsubDm = null; }
  document.getElementById('dm-room-list').style.display = 'block';
  document.getElementById('dm-chat-wrap').classList.remove('open');
}

async function sendDmMsg() {
  if (!currentUser || !currentDmRoomId) return;
  const input = document.getElementById('dm-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const batch = db.batch();
  const msgRef = db.collection('dmRooms').doc(currentDmRoomId).collection('messages').doc();
  batch.set(msgRef, { text, uid: currentUser.uid, name: currentUser.displayName || '나', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  batch.update(db.collection('dmRooms').doc(currentDmRoomId), { lastMsg: text, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  await batch.commit();
}

// ── 챗봇 ──
const BOT_ANSWERS = [
  { keys: ['사이즈','규격','고르는','선택'], answer: '타이어 사이즈는 운전석 문 안쪽 스티커나 현재 타이어 측면에서 확인할 수 있어요!\n예: 205/55R16 → 폭205mm / 편평비55% / 림16인치\n사이즈가 다르면 안전에 문제가 될 수 있으니 꼭 동일 사이즈를 사용해 주세요 🙏' },
  { keys: ['배송','언제','도착','얼마나'], answer: '주문 후 보통 1~3일 이내 배송됩니다 🚚\n도서 산간 지역은 추가 1~2일 소요돼요!' },
  { keys: ['장착','설치','공임','어디서'], answer: '타이어 구매 후 가까운 타이어 전문점이나 카센터에서 장착하시면 됩니다 🔧\n장착 공임은 보통 1개당 5,000~15,000원 수준이에요!' },
  { keys: ['환불','반품','교환','취소'], answer: '수령 후 7일 이내 환불/교환 가능합니다 💰\n장착 후에는 환불이 어려울 수 있어요!' },
  { keys: ['세이프페이','안전결제','보호','사기'], answer: '세이프페이는 타이어세이프의 안전 결제 시스템이에요 🔒\n장착 완료 확인 후 판매자에게 지급돼요!' },
  { keys: ['가격','얼마','비용'], answer: '중고타이어는 새 타이어의 30~60% 수준이에요 💡\n홈 탭에서 현재 매물을 확인해보세요!' },
  { keys: ['전문가','검증','인증','믿을'], answer: '모든 매물은 카센터 10년 경력 전문가가 직접 검수해요 ✅' },
  { keys: ['사장님','직접','상담','연결','전화','통화'], answer: null },
];
function getBotAnswer(msg) {
  const m = msg.toLowerCase();
  for (const item of BOT_ANSWERS) { if (item.keys.some(k => m.includes(k))) return item.answer; }
  return undefined;
}
function addBotMsg(text, isUser = false) {
  const box = document.getElementById('bot-messages');
  const div = document.createElement('div');
  div.className = 'chat-bubble-wrap' + (isUser ? ' me' : '');
  div.innerHTML = `<div><div class="chat-bubble${isUser ? '' : ' bot'}" style="white-space:pre-line">${text}</div></div>`;
  box.appendChild(div); box.scrollTop = box.scrollHeight;
}
function quickAsk(q) { document.getElementById('bot-input').value = q; sendBotMsg(); }
async function sendBotMsg() {
  const input = document.getElementById('bot-input');
  const msg = input.value.trim(); if (!msg) return;
  input.value = ''; addBotMsg(msg, true);
  setTimeout(async () => {
    const answer = getBotAnswer(msg);
    if (answer === null) {
      addBotMsg('사장님께 직접 연결해드릴게요! 잠시만요 👨‍💼');
      setTimeout(async () => {
        if (!currentUser) { addBotMsg('로그인 후 이용하실 수 있어요!'); return; }
        await openOrCreateDmRoom(ADMIN_UID, '타이어세이프 사장님', '');
        addBotMsg('사장님과의 채팅방을 열었어요! 1:1 대화 탭을 확인해주세요 💬');
      }, 600);
    } else if (answer === undefined) {
      addBotMsg('정확한 답변을 드리기 어렵네요 😅\n사장님께 질문을 전달해드릴게요!');
      if (currentUser) {
        const roomId = getRoomId(currentUser.uid, ADMIN_UID);
        await db.collection('dmRooms').doc(roomId).set({
          users: [currentUser.uid, ADMIN_UID],
          userNames: { [currentUser.uid]: currentUser.displayName||'고객', [ADMIN_UID]: '타이어세이프 사장님' },
          userPhotos: { [currentUser.uid]: currentUser.photoURL||'' },
          lastMsg: `[챗봇 미답변] ${msg}`,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true });
        await db.collection('dmRooms').doc(roomId).collection('messages').add({
          text: `[챗봇이 답변 못한 질문]\n"${msg}"\n\n고객님이 위 질문을 하셨어요. 답변 부탁드립니다!`,
          uid: 'system', name: '시스템', createdAt: firebase.firestore.FieldValue.serverTimestamp(), isSystem: true,
        });
        setTimeout(() => addBotMsg('사장님께 전달했어요! 1:1 대화 탭에서 답변을 확인하세요 📩'), 600);
      }
    } else { addBotMsg(answer); }
  }, 400);
}

// ── 매물, 사진 다중 업로드 및 삭제 ──
function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 500; let w = img.width, h = img.height;
        if (w > h && w > MAX) { h = h*MAX/w; w = MAX; } else if (h > MAX) { w = w*MAX/h; h = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function loadTires() {
  const grid = document.getElementById('tire-grid');
  grid.innerHTML = '<div class="loading" style="grid-column:1/-1"><div class="spinner"></div><p>불러오는 중...</p></div>';
  try {
    const snap = await db.collection('tires').orderBy('createdAt', 'desc').get();
    if (snap.empty) { grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🛞</div><p>등록된 매물이 없습니다.<br>첫 번째 타이어를 올려보세요!</p></div>'; return; }
    grid.innerHTML = snap.docs.map(doc => {
      const t = { id: doc.id, ...doc.data() };
      const safe = JSON.stringify({ id:t.id, title:t.title, size:t.size, price:t.price, description:t.description, imageUrl:t.imageUrl, imageUrls:t.imageUrls, sellerName:t.sellerName, sellerId:t.sellerId }).replace(/'/g,'&#39;');
      return `<div class="tire-card" onclick='openModal(${JSON.stringify(safe)})'>
        ${t.imageUrl ? `<img class="tire-card-img" src="${t.imageUrl}" loading="lazy">` : '<div class="tire-card-placeholder">🛞</div>'}
        <div class="tire-card-body">
          <div class="tire-card-badge">인증</div>
          <div class="tire-card-title">${t.title}</div>
          <div class="tire-card-size">${t.size||'-'}</div>
          <div class="tire-card-price">${Number(t.price).toLocaleString()}원</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) { grid.innerHTML = `<div style="grid-column:1/-1;padding:20px;color:var(--red);font-size:13px">오류: ${e.message}</div>`; }
}

function renderSellForm() {
  document.getElementById('sell-content').innerHTML = `
    <div class="photo-upload" onclick="document.getElementById('file-input').click()">
      <div id="preview-placeholder" style="text-align:center;">
        <div style="font-size:36px;margin-bottom:8px">📸</div>
        <div style="font-size:13px;color:var(--gray-400);font-weight:600">사진 선택 (최대 3장)</div>
      </div>
      <div id="preview-container" style="position:absolute; inset:0; display:none; gap:8px; padding:16px; overflow-x:auto; background:var(--gray-50); align-items:center;"></div>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handlePhoto(this)">
    <div class="form-group"><label class="form-label">타이어 모델명 *</label><input type="text" class="form-input" id="f-title" placeholder="예: 금호 마제스티9"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">사이즈</label><input type="text" class="form-input" id="f-size" placeholder="245/45/18"></div>
      <div class="form-group"><label class="form-label">가격 (원) *</label><input type="number" class="form-input" id="f-price" placeholder="100000"></div>
    </div>
    <div class="form-group"><label class="form-label">상태 설명</label><textarea class="form-textarea" id="f-desc" placeholder="트레드 잔량, DOT 제조일자, 특이사항 등"></textarea></div>
    <button class="btn-primary" id="submit-btn" onclick="submitTire()">매물 등록하기</button>`;
}

function handlePhoto(input) {
  const files = input.files; 
  if (!files || files.length === 0) return;
  if (files.length > 3) {
    toast('사진은 최대 3장까지만 올릴 수 있습니다.');
    input.value = ''; 
    return;
  }
  
  const container = document.getElementById('preview-container');
  const placeholder = document.getElementById('preview-placeholder');
  
  container.innerHTML = ''; 
  placeholder.style.display = 'none';
  container.style.display = 'flex';
  
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => { 
      const img = document.createElement('img');
      img.src = e.target.result;
      img.style.height = '100%';
      img.style.width = '100px';
      img.style.objectFit = 'cover';
      img.style.borderRadius = '8px';
      img.style.flexShrink = '0';
      container.appendChild(img); 
    };
    reader.readAsDataURL(file);
  });
}

async function submitTire() {
  if (!currentUser) { toast('로그인이 필요합니다'); return; }
  const title = document.getElementById('f-title').value.trim();
  const size  = document.getElementById('f-size').value.trim();
  const price = document.getElementById('f-price').value.trim();
  const desc  = document.getElementById('f-desc').value.trim();
  const files = document.getElementById('file-input').files;
  
  if (!title) { toast('모델명을 입력해주세요'); return; }
  if (!price) { toast('가격을 입력해주세요'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '등록 중...';
  
  try {
    let imageUrls = [];
    if (files && files.length > 0) {
      for (let i = 0; i < files.length; i++) {
        const compressed = await compressImage(files[i]);
        imageUrls.push(compressed);
      }
    }
    
    await db.collection('tires').add({ 
      title, 
      size, 
      price: parseInt(price), 
      description: desc, 
      imageUrls: imageUrls, 
      imageUrl: imageUrls.length > 0 ? imageUrls[0] : null, 
      sellerName: currentUser.displayName || '판매자', 
      sellerId: currentUser.uid, 
      createdAt: firebase.firestore.FieldValue.serverTimestamp() 
    });
    
    toast('✅ 매물이 등록되었습니다!');
    setTimeout(() => switchTab('home'), 1000);
  } catch(e) { 
    toast('❌ ' + e.message); 
  } finally { 
    btn.disabled = false; btn.textContent = '매물 등록하기'; 
  }
}

function openModal(t) {
  if (typeof t === 'string') t = JSON.parse(t);
  currentModalTire = t;
  
  const imgContainer = document.getElementById('modal-img-container');
  imgContainer.innerHTML = ''; 
  
  const urls = (t.imageUrls && t.imageUrls.length > 0) ? t.imageUrls : (t.imageUrl ? [t.imageUrl] : []);
  
  if (urls.length > 0) {
    urls.forEach(url => {
      imgContainer.innerHTML += `<img class="modal-img" src="${url}" style="flex-shrink:0; width:100%; object-fit:cover; scroll-snap-align: start; border-radius:12px;">`;
    });
    imgContainer.style.display = 'flex';
  } else {
    imgContainer.style.display = 'none';
  }
  
  document.getElementById('modal-title').textContent = t.title;
  document.getElementById('modal-size').textContent = t.size || '';
  document.getElementById('modal-desc').textContent = t.description || '전문가가 직접 검수한 상품입니다.';
  document.getElementById('modal-price').textContent = Number(t.price).toLocaleString() + '원';
  document.getElementById('modal-seller').textContent = t.sellerName ? '판매자: ' + t.sellerName : '';
  
  const chatBtn = document.getElementById('modal-chat-btn');
  const payBtn = document.getElementById('modal-pay-btn');
  const deleteBtn = document.getElementById('modal-delete-btn');
  
  if (currentUser && currentUser.uid === t.sellerId) {
    chatBtn.style.display = 'none';
    payBtn.style.display = 'none';
    deleteBtn.style.display = 'block';
  } else {
    chatBtn.style.display = '';
    payBtn.style.display = '';
    deleteBtn.style.display = 'none';
  }
  
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); document.body.style.overflow = ''; }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── 게시글 삭제 기능 ──
async function deleteTire() {
  if (!currentModalTire || !currentModalTire.id) return;
  if (!confirm("정말 이 매물 게시글을 삭제하시겠습니까?")) return;
  
  try {
    await db.collection('tires').doc(currentModalTire.id).delete();
    toast('🗑️ 게시글이 삭제되었습니다.');
    closeModal();
    loadTires(); 
  } catch(e) {
    toast('❌ 삭제 실패: ' + e.message);
  }
}
</script>
